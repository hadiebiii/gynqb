<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بانک سؤالات بورد زنان و زایمان</title>
  <meta name="description" content="مرور آزمونی سؤالات بورد، ارتقا و فلوشیپ زنان و زایمان بر اساس رفرنس و فصل" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">

  <style>
    :root {
      --font-primary: 'Vazirmatn', 'IRANSans', 'Tahoma', 'Arial', sans-serif;

      --c-white: #FFFFFF;
      --c-page: #F0F2F5;

      --c-text: #1A1D23;
      --c-text-2: #4A5060;
      --c-text-3: #8A90A0;

      --c-navy: #1B2A4A;
      --c-navy-mid: #243659;
      --c-blue: #2B5BA8;
      --c-blue-light: #EBF1FB;
      --c-blue-soft: #D5E4F7;

      --c-green: #1A7A4A;
      --c-green-bg: #EBF7F1;
      --c-green-border: #A3DBBE;

      --c-red: #B22222;
      --c-red-bg: #FDEDED;
      --c-red-border: #F0AAAA;

      --c-accent: #C8870A;
      --c-accent-bg: #FFF8EC;
      --c-gold: #B8960A;

      --c-border: #E2E6EC;

      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --radius-pill: 999px;

      --shadow-sm: 0 1px 3px rgba(27,42,74,0.06), 0 1px 2px rgba(27,42,74,0.04);
      --shadow-card: 0 2px 12px rgba(27,42,74,0.09), 0 1px 3px rgba(27,42,74,0.06);
      --shadow-hover: 0 4px 20px rgba(27,42,74,0.13), 0 2px 6px rgba(27,42,74,0.08);

      --ease-standard: cubic-bezier(0.4, 0, 0.2, 1);
      --dur-fast: 150ms;
      --dur-normal: 220ms;
      --dur-slow: 350ms;

      --text-xs: 10px;
      --text-sm: 11px;
      --text-base: 12px;
      --text-md: 13px;
      --text-body: 14px;
      --text-stem: 14.5px;
      --text-h3: 16px;
      --text-h2: 18px;
      --text-h1: 22px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-primary);
      direction: rtl;
      background: var(--c-page);
      color: var(--c-text);
      font-size: var(--text-body);
      -webkit-font-smoothing: antialiased;
      line-height: 1.7;
    }

    .q-body { line-height: 1.85; }
    .q-stem { line-height: 1.75; }
    .opt-text { line-height: 1.65; }
    .explain-text { line-height: 1.82; }

    a { color: inherit; text-decoration: none; }

    /* ---------- Layout ---------- */
    .wrap { max-width: 920px; margin: 0 auto; padding: 0 16px 64px; }

    /* ---------- Header ---------- */
    header.site-header {
      background: linear-gradient(135deg, var(--c-navy) 0%, var(--c-navy-mid) 100%);
      color: var(--c-white);
      padding: 22px 16px;
      box-shadow: var(--shadow-card);
    }
    .header-inner { max-width: 920px; margin: 0 auto; }
    .site-title {
      font-size: var(--text-h1);
      font-weight: 800;
      display: flex; align-items: center; gap: 10px;
    }
    .site-title i { color: var(--c-blue-soft); font-size: 26px; }
    .site-sub { font-size: var(--text-md); color: var(--c-blue-soft); margin-top: 4px; font-weight: 400; }

    .stats-row {
      display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px;
    }
    .stat-pill {
      background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--radius-pill);
      padding: 6px 14px;
      font-size: var(--text-base);
      display: flex; align-items: center; gap: 6px;
    }
    .stat-pill b { font-size: var(--text-md); font-weight: 700; }
    .stat-pill i { font-size: 15px; opacity: .85; }

    /* ---------- Breadcrumb ---------- */
    .crumbs {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
      margin: 18px 0 6px; font-size: var(--text-base); color: var(--c-text-2);
    }
    .crumb-btn {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius-pill); padding: 5px 12px; cursor: pointer;
      font-family: inherit; font-size: var(--text-base); color: var(--c-blue);
      display: inline-flex; align-items: center; gap: 5px;
      transition: background var(--dur-fast) var(--ease-standard);
    }
    .crumb-btn:hover { background: var(--c-blue-light); }
    .crumbs .sep { color: var(--c-text-3); }

    /* ---------- Section titles ---------- */
    .section-title {
      font-size: var(--text-h2); font-weight: 700; margin: 18px 0 14px;
      display: flex; align-items: center; gap: 8px; color: var(--c-navy);
    }
    .section-title i { color: var(--c-blue); }

    .group-label {
      font-size: var(--text-md); font-weight: 600; color: var(--c-text-2);
      margin: 22px 0 10px; padding-right: 4px;
      display: flex; align-items: center; gap: 6px;
    }
    .group-label.complementary { color: var(--c-text-3); }

    /* ---------- Book cards ---------- */
    .book-grid {
      display: grid; gap: 14px;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    }
    .book-card {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius-lg); padding: 18px;
      cursor: pointer; box-shadow: var(--shadow-sm);
      transition: transform var(--dur-normal) var(--ease-standard),
                  box-shadow var(--dur-normal) var(--ease-standard),
                  border-color var(--dur-normal) var(--ease-standard);
      animation: fadeUp var(--dur-slow) var(--ease-standard) both;
      position: relative; overflow: hidden;
    }
    .book-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); border-color: var(--c-blue-soft); }
    .book-card .bc-icon {
      width: 44px; height: 44px; border-radius: var(--radius);
      background: var(--c-blue-light); color: var(--c-blue);
      display: flex; align-items: center; justify-content: center; font-size: 24px;
      margin-bottom: 12px;
    }
    .book-card.primary { border-top: 3px solid var(--c-blue); }
    .book-card.complementary .bc-icon { background: var(--c-accent-bg); color: var(--c-accent); }
    .book-card .bc-name { font-size: var(--text-h3); font-weight: 700; }
    .book-card .bc-meta { font-size: var(--text-base); color: var(--c-text-2); margin-top: 6px; display: flex; gap: 12px; flex-wrap: wrap; }
    .book-card .bc-meta span { display: inline-flex; align-items: center; gap: 4px; }
    .badge-primary {
      position: absolute; top: 12px; left: 12px;
      font-size: var(--text-xs); background: var(--c-blue); color: #fff;
      padding: 2px 8px; border-radius: var(--radius-pill); font-weight: 600;
    }

    /* ---------- Chapter list ---------- */
    .search-box {
      display: flex; align-items: center; gap: 8px;
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 14px;
      box-shadow: var(--shadow-sm);
    }
    .search-box i { color: var(--c-text-3); font-size: 18px; }
    .search-box input {
      border: none; outline: none; flex: 1; font-family: inherit;
      font-size: var(--text-body); background: transparent; color: var(--c-text);
    }
    .chapter-list { display: flex; flex-direction: column; gap: 8px; }
    .chapter-item {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius); padding: 12px 14px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: background var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard);
      animation: fadeUp var(--dur-normal) var(--ease-standard) both;
    }
    .chapter-item:hover { background: var(--c-blue-light); border-color: var(--c-blue-soft); }
    .chapter-num {
      flex-shrink: 0; min-width: 40px; height: 40px; padding: 0 8px;
      border-radius: var(--radius); background: var(--c-navy); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: var(--text-md);
    }
    .chapter-main { flex: 1; min-width: 0; }
    .chapter-title-txt { font-weight: 600; font-size: var(--text-md); }
    .chapter-sub { font-size: var(--text-base); color: var(--c-text-2); margin-top: 2px; display: flex; gap: 12px; flex-wrap: wrap; }
    .chapter-sub .review-mini { color: var(--c-accent); }
    .chapter-item .ti-chevron-left { color: var(--c-text-3); font-size: 18px; }
    .empty-note { color: var(--c-text-3); text-align: center; padding: 30px; font-size: var(--text-md); }

    /* ---------- Question view ---------- */
    .q-meta-card {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-sm);
      margin-bottom: 14px;
    }
    .q-meta-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px 18px; }
    .q-meta-item { font-size: var(--text-base); }
    .q-meta-item .lbl { color: var(--c-text-3); display: flex; align-items: center; gap: 5px; }
    .q-meta-item .val { color: var(--c-text); font-weight: 600; font-size: var(--text-md); margin-top: 2px; }

    .progress-card {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius-lg); padding: 14px 16px; box-shadow: var(--shadow-sm);
      margin-bottom: 14px;
    }
    .progress-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
    .progress-head .ptitle { font-size: var(--text-md); font-weight: 600; color: var(--c-navy); }
    .progress-stats { display: flex; gap: 8px; flex-wrap: wrap; }
    .pstat { font-size: var(--text-base); padding: 4px 10px; border-radius: var(--radius-pill); display: inline-flex; align-items: center; gap: 4px; }
    .pstat.done { background: var(--c-blue-light); color: var(--c-blue); }
    .pstat.correct { background: var(--c-green-bg); color: var(--c-green); }
    .pstat.wrong { background: var(--c-red-bg); color: var(--c-red); }
    .bar { height: 8px; background: var(--c-page); border-radius: var(--radius-pill); margin-top: 12px; overflow: hidden; }
    .bar > span { display: block; height: 100%; background: linear-gradient(90deg, var(--c-blue), var(--c-green)); border-radius: var(--radius-pill); transition: width var(--dur-slow) var(--ease-standard); }
    .reset-btn {
      background: transparent; border: 1px solid var(--c-red-border); color: var(--c-red);
      border-radius: var(--radius); padding: 5px 10px; font-family: inherit;
      font-size: var(--text-base); cursor: pointer; display: inline-flex; align-items: center; gap: 5px;
      transition: background var(--dur-fast) var(--ease-standard);
    }
    .reset-btn:hover { background: var(--c-red-bg); }

    .q-card {
      background: var(--c-white); border: 1px solid var(--c-border);
      border-radius: var(--radius-xl); padding: 20px; box-shadow: var(--shadow-card);
      animation: fadeUp var(--dur-normal) var(--ease-standard) both;
    }
    .q-topline { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
    .q-number-badge {
      font-size: var(--text-base); font-weight: 700; color: var(--c-blue);
      background: var(--c-blue-light); padding: 4px 12px; border-radius: var(--radius-pill);
    }
    .review-badge {
      font-size: var(--text-xs); font-weight: 600; color: var(--c-accent);
      background: var(--c-accent-bg); border: 1px solid #F0D9A6;
      padding: 3px 10px; border-radius: var(--radius-pill);
      display: inline-flex; align-items: center; gap: 4px;
    }
    .q-stem { font-size: var(--text-stem); font-weight: 500; color: var(--c-text); margin-bottom: 18px; }

    .opt-list { display: flex; flex-direction: column; gap: 10px; }
    .opt {
      display: flex; align-items: flex-start; gap: 12px;
      background: var(--c-white); border: 1.5px solid var(--c-border);
      border-radius: var(--radius); padding: 12px 14px; cursor: pointer; text-align: right;
      width: 100%; font-family: inherit;
      transition: border-color var(--dur-fast) var(--ease-standard), background var(--dur-fast) var(--ease-standard);
    }
    .opt:hover:not(.locked) { border-color: var(--c-blue); background: var(--c-blue-light); }
    .opt .opt-key {
      flex-shrink: 0; width: 28px; height: 28px; border-radius: 50%;
      background: var(--c-page); color: var(--c-text-2); font-weight: 700;
      display: flex; align-items: center; justify-content: center; font-size: var(--text-base);
    }
    .opt .opt-text { flex: 1; font-size: var(--text-body); color: var(--c-text); padding-top: 2px; }
    .opt .opt-mark { flex-shrink: 0; font-size: 20px; opacity: 0; }
    .opt.locked { cursor: default; }
    .opt.disabled { opacity: .65; }

    .opt.correct { border-color: var(--c-green-border); background: var(--c-green-bg); animation: opt-correct var(--dur-slow) var(--ease-standard); }
    .opt.correct .opt-key { background: var(--c-green); color: #fff; }
    .opt.correct .opt-mark { opacity: 1; color: var(--c-green); }
    .opt.wrong { border-color: var(--c-red-border); background: var(--c-red-bg); animation: opt-shake var(--dur-slow) var(--ease-standard); }
    .opt.wrong .opt-key { background: var(--c-red); color: #fff; }
    .opt.wrong .opt-mark { opacity: 1; color: var(--c-red); }
    .opt.empty-opt { color: var(--c-text-3); font-style: italic; cursor: default; }

    /* ---------- Answer panel ---------- */
    .answer-panel { margin-top: 18px; border-top: 1px dashed var(--c-border); padding-top: 16px; animation: fadeUp var(--dur-normal) var(--ease-standard) both; }
    .verdict { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: var(--text-md); margin-bottom: 12px; padding: 10px 12px; border-radius: var(--radius); }
    .verdict.good { background: var(--c-green-bg); color: var(--c-green); border: 1px solid var(--c-green-border); }
    .verdict.bad { background: var(--c-red-bg); color: var(--c-red); border: 1px solid var(--c-red-border); }
    .verdict.neutral { background: var(--c-blue-light); color: var(--c-blue); border: 1px solid var(--c-blue-soft); }
    .ans-block { margin-bottom: 12px; }
    .ans-block .ans-h { font-size: var(--text-base); color: var(--c-text-3); font-weight: 600; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
    .ans-block .ans-correct { font-weight: 700; color: var(--c-green); font-size: var(--text-md); }
    .explain-text { font-size: var(--text-body); color: var(--c-text-2); white-space: pre-wrap; }
    .citation-text { font-size: var(--text-base); color: var(--c-text-2); background: var(--c-page); border-radius: var(--radius); padding: 10px 12px; }

    /* ---------- Nav ---------- */
    .nav-bar {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      margin-top: 16px; flex-wrap: wrap;
    }
    .nav-btn {
      background: var(--c-white); border: 1px solid var(--c-border); color: var(--c-navy);
      border-radius: var(--radius); padding: 9px 16px; cursor: pointer; font-family: inherit;
      font-size: var(--text-md); font-weight: 600; display: inline-flex; align-items: center; gap: 6px;
      transition: background var(--dur-fast) var(--ease-standard), border-color var(--dur-fast) var(--ease-standard);
    }
    .nav-btn:hover:not(:disabled) { background: var(--c-blue-light); border-color: var(--c-blue-soft); }
    .nav-btn:disabled { opacity: .45; cursor: not-allowed; }
    .nav-btn.primary { background: var(--c-blue); color: #fff; border-color: var(--c-blue); }
    .nav-btn.primary:hover:not(:disabled) { background: var(--c-navy-mid); }
    .jump-box { display: flex; align-items: center; gap: 6px; font-size: var(--text-base); color: var(--c-text-2); }
    .jump-box input {
      width: 64px; text-align: center; font-family: inherit; font-size: var(--text-md);
      border: 1px solid var(--c-border); border-radius: var(--radius); padding: 7px 6px; outline: none;
    }
    .jump-box input:focus { border-color: var(--c-blue); }
    .counter-line { text-align: center; font-size: var(--text-base); color: var(--c-text-2); margin-top: 12px; }
    .jump-error { color: var(--c-red); font-size: var(--text-base); text-align: center; margin-top: 8px; min-height: 18px; }

    /* ---------- States ---------- */
    .state-box { text-align: center; padding: 60px 20px; color: var(--c-text-2); }
    .state-box i { font-size: 48px; color: var(--c-text-3); display: block; margin-bottom: 14px; }
    .state-box.error i { color: var(--c-red); }
    .state-box .st-title { font-size: var(--text-h3); font-weight: 700; color: var(--c-text); margin-bottom: 6px; }
    .spinner {
      width: 38px; height: 38px; border: 4px solid var(--c-blue-light);
      border-top-color: var(--c-blue); border-radius: 50%; margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }
    .retry-btn {
      margin-top: 16px; background: var(--c-blue); color: #fff; border: none;
      border-radius: var(--radius); padding: 9px 18px; cursor: pointer; font-family: inherit;
      font-size: var(--text-md); font-weight: 600;
    }

    .hidden { display: none !important; }

    /* ---------- Animations ---------- */
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes opt-correct { 0% { transform: scale(0.98); } 60% { transform: scale(1.015); } 100% { transform: scale(1); } }
    @keyframes opt-shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .site-title { font-size: var(--text-h2); }
      .q-card { padding: 16px; }
      .nav-bar { flex-direction: column; align-items: stretch; }
      .jump-box { justify-content: center; }
      .nav-btn { justify-content: center; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation: none !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="site-title"><i class="ti ti-stethoscope"></i><span>بانک سؤالات بورد زنان و زایمان</span></div>
      <div class="site-sub">مرور آزمونی بر اساس رفرنس و فصل</div>
      <div class="stats-row" id="headerStats"></div>
    </div>
  </header>

  <main class="wrap">
    <nav class="crumbs hidden" id="crumbs"></nav>

    <!-- Loading -->
    <div id="viewLoading" class="state-box">
      <div class="spinner"></div>
      <div class="st-title">در حال بارگذاری داده‌ها…</div>
      <div>لطفاً چند لحظه صبر کنید.</div>
    </div>

    <!-- Error -->
    <div id="viewError" class="state-box error hidden">
      <i class="ti ti-alert-triangle"></i>
      <div class="st-title">خطا در خواندن داده‌ها</div>
      <div id="errorMsg">فایل سؤالات پیدا نشد یا قابل خواندن نبود.</div>
      <button class="retry-btn" id="retryBtn"><i class="ti ti-refresh"></i> تلاش مجدد</button>
    </div>

    <!-- Books -->
    <section id="viewBooks" class="hidden">
      <h2 class="section-title"><i class="ti ti-books"></i> انتخاب رفرنس</h2>
      <div id="primaryBooks" class="book-grid"></div>
      <div class="group-label complementary"><i class="ti ti-layers-subtract"></i> رفرنس‌های تکمیلی</div>
      <div id="complementaryBooks" class="book-grid"></div>
    </section>

    <!-- Chapters -->
    <section id="viewChapters" class="hidden">
      <h2 class="section-title"><i class="ti ti-list-details"></i> انتخاب فصل — <span id="chaptersBookName"></span></h2>
      <div class="search-box">
        <i class="ti ti-search"></i>
        <input type="text" id="chapterSearch" placeholder="جستجو در عنوان فصل‌ها…" autocomplete="off" />
      </div>
      <div id="chapterList" class="chapter-list"></div>
    </section>

    <!-- Question -->
    <section id="viewQuestion" class="hidden">
      <div class="q-meta-card">
        <div class="q-meta-grid" id="qMetaGrid"></div>
      </div>

      <div class="progress-card">
        <div class="progress-head">
          <span class="ptitle"><i class="ti ti-chart-bar"></i> پیشرفت این فصل</span>
          <button class="reset-btn" id="resetBtn"><i class="ti ti-trash"></i> پاک کردن پیشرفت این فصل</button>
        </div>
        <div class="progress-stats" id="progressStats" style="margin-top:12px;"></div>
        <div class="bar"><span id="progressBar" style="width:0%"></span></div>
      </div>

      <div class="q-card" id="qCard"></div>

      <div class="nav-bar">
        <button class="nav-btn" id="prevBtn"><i class="ti ti-chevron-right"></i> سؤال قبلی</button>
        <div class="jump-box">
          <span>برو به سؤال:</span>
          <input type="number" id="jumpInput" min="1" />
          <button class="nav-btn" id="jumpBtn">برو</button>
        </div>
        <button class="nav-btn primary" id="nextBtn">سؤال بعدی <i class="ti ti-chevron-left"></i></button>
      </div>
      <div class="jump-error" id="jumpError"></div>
      <div class="counter-line" id="counterLine"></div>
    </section>
  </main>

  <script>
  (function () {
    "use strict";

    // ---------------------------------------------------------------------
    // وضعیت سراسری
    // ---------------------------------------------------------------------
    var STORAGE_KEY = "gynqb-progress-v1";
    var OPTION_LABELS = ["الف", "ب", "ج", "د"];

    var state = {
      questions: [],
      summary: null,
      byBook: {},          // book_fa -> [questions]
      currentBook: null,   // book_fa
      currentChapterKey: null,
      chapterQuestions: [], // questions of current chapter (ordered)
      index: 0,            // index within chapterQuestions
      progress: {}         // loaded from localStorage
    };

    // ---------------------------------------------------------------------
    // ابزارهای کوتاه
    // ---------------------------------------------------------------------
    function $(id) { return document.getElementById(id); }
    function el(tag, cls, html) {
      var e = document.createElement(tag);
      if (cls) e.className = cls;
      if (html != null) e.innerHTML = html;
      return e;
    }
    function esc(str) {
      return String(str == null ? "" : str)
        .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }
    function normalizeText(str) {
      // یکدست‌سازی برای جستجو: حذف فاصله‌ی اضافه و یکسان‌سازی ی/ک
      return String(str || "")
        .replace(/ي/g, "ی")  // ي عربی -> ی فارسی
        .replace(/ك/g, "ک")  // ك عربی -> ک فارسی
        .replace(/‌/g, " ")
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }
    function toFa(num) {
      var d = "۰۱۲۳۴۵۶۷۸۹";
      return String(num).replace(/[0-9]/g, function (m) { return d[+m]; });
    }
    var BOOK_ICONS = {
      "ویلیامز": "ti-baby-carriage",
      "نواک": "ti-gender-female",
      "اسپیروف": "ti-dna",
      "تلیندز": "ti-scalpel",
      "آپتودیت": "ti-cloud-search",
      "سایر": "ti-dots"
    };

    // ---------------------------------------------------------------------
    // بارگذاری داده‌ها
    // ---------------------------------------------------------------------
    function loadData() {
      showView("loading");
      Promise.all([
        fetch("./questions.json").then(checkResp),
        fetch("./summary.json").then(checkResp)
      ]).then(function (res) {
        state.questions = res[0];
        state.summary = res[1];
        if (!Array.isArray(state.questions) || !state.questions.length) {
          throw new Error("فایل سؤالات خالی است یا ساختار درستی ندارد.");
        }
        indexQuestions();
        loadProgress();
        renderHeaderStats();
        renderBookCards();
        showView("books");
      }).catch(function (err) {
        showError(err && err.message ? err.message : "خطای ناشناخته در بارگذاری داده‌ها.");
      });
    }

    function checkResp(r) {
      if (!r.ok) throw new Error("فایل داده پیدا نشد (کد " + r.status + ").");
      return r.json().catch(function () {
        throw new Error("ساختار فایل JSON معتبر نیست.");
      });
    }

    function indexQuestions() {
      state.byBook = {};
      state.questions.forEach(function (q) {
        (state.byBook[q.book_fa] = state.byBook[q.book_fa] || []).push(q);
      });
    }

    // ---------------------------------------------------------------------
    // localStorage
    // ---------------------------------------------------------------------
    function loadProgress() {
      try {
        var raw = localStorage.getItem(STORAGE_KEY);
        state.progress = raw ? JSON.parse(raw) : {};
      } catch (e) { state.progress = {}; }
      if (!state.progress || typeof state.progress !== "object") state.progress = {};
    }
    function saveProgress() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); } catch (e) {}
    }
    function chapterProgress(key) {
      if (!state.progress[key]) state.progress[key] = { answers: {} };
      if (!state.progress[key].answers) state.progress[key].answers = {};
      return state.progress[key];
    }

    // ---------------------------------------------------------------------
    // Views
    // ---------------------------------------------------------------------
    var VIEWS = ["loading", "error", "books", "chapters", "question"];
    function showView(name) {
      $("viewLoading").classList.toggle("hidden", name !== "loading");
      $("viewError").classList.toggle("hidden", name !== "error");
      $("viewBooks").classList.toggle("hidden", name !== "books");
      $("viewChapters").classList.toggle("hidden", name !== "chapters");
      $("viewQuestion").classList.toggle("hidden", name !== "question");
      renderCrumbs(name);
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
    function showError(msg) {
      $("errorMsg").textContent = msg;
      showView("error");
    }

    function renderCrumbs(view) {
      var c = $("crumbs");
      if (view !== "books" && view !== "chapters" && view !== "question") {
        c.classList.add("hidden"); return;
      }
      c.classList.remove("hidden");
      c.innerHTML = "";
      var home = el("button", "crumb-btn", '<i class="ti ti-home"></i> رفرنس‌ها');
      home.dataset.nav = "books";
      c.appendChild(home);
      if ((view === "chapters" || view === "question") && state.currentBook) {
        c.appendChild(el("span", "sep", "‹"));
        var b = el("button", "crumb-btn", '<i class="ti ti-book"></i> ' + esc(state.currentBook));
        b.dataset.nav = "chapters";
        c.appendChild(b);
      }
      if (view === "question" && state.chapterQuestions.length) {
        c.appendChild(el("span", "sep", "‹"));
        var cq = state.chapterQuestions[0];
        c.appendChild(el("span", "", "فصل " + esc(cq.chapter)));
      }
    }

    // ---------------------------------------------------------------------
    // Header stats
    // ---------------------------------------------------------------------
    function renderHeaderStats() {
      var s = state.summary;
      var booksCount = (s.book_order || Object.keys(state.byBook)).length;
      var items = [
        { i: "ti-clipboard-list", v: s.total, t: "سؤال" },
        { i: "ti-books", v: booksCount, t: "رفرنس" },
        { i: "ti-list-numbers", v: s.total_chapters, t: "فصل" },
        { i: "ti-flag", v: s.review_count, t: "نیازمند بازبینی" }
      ];
      var box = $("headerStats");
      box.innerHTML = "";
      items.forEach(function (it) {
        box.appendChild(el("div", "stat-pill",
          '<i class="ti ' + it.i + '"></i> <b>' + toFa(it.v) + '</b> ' + it.t));
      });
    }

    // ---------------------------------------------------------------------
    // Book cards
    // ---------------------------------------------------------------------
    function renderBookCards() {
      var s = state.summary;
      var primary = $("primaryBooks");
      var comp = $("complementaryBooks");
      primary.innerHTML = ""; comp.innerHTML = "";
      var books = s.books || [];
      books.forEach(function (b, i) {
        var card = buildBookCard(b, i);
        (b.is_primary ? primary : comp).appendChild(card);
      });
    }
    function buildBookCard(b, i) {
      var icon = BOOK_ICONS[b.book_fa] || "ti-book";
      var card = el("button", "book-card " + (b.is_primary ? "primary" : "complementary"));
      card.style.animationDelay = (i * 40) + "ms";
      card.dataset.book = b.book_fa;
      card.innerHTML =
        (b.is_primary ? '<span class="badge-primary">رفرنس اصلی</span>' : '') +
        '<div class="bc-icon"><i class="ti ' + icon + '"></i></div>' +
        '<div class="bc-name">' + esc(b.book_fa) + '</div>' +
        '<div class="bc-meta">' +
          '<span><i class="ti ti-clipboard-list"></i> ' + toFa(b.count) + ' سؤال</span>' +
          '<span><i class="ti ti-list-numbers"></i> ' + toFa(b.chapter_count) + ' فصل</span>' +
        '</div>';
      return card;
    }

    function selectBook(bookFa) {
      state.currentBook = bookFa;
      renderChapterList("");
      $("chaptersBookName").textContent = bookFa;
      $("chapterSearch").value = "";
      showView("chapters");
    }

    // ---------------------------------------------------------------------
    // Chapter list
    // ---------------------------------------------------------------------
    function currentBookChapters() {
      var s = state.summary;
      var entry = (s.books || []).find(function (b) { return b.book_fa === state.currentBook; });
      return entry ? entry.chapters : [];
    }

    function renderChapterList(filter) {
      var list = $("chapterList");
      list.innerHTML = "";
      var chapters = currentBookChapters();
      var nf = normalizeText(filter);
      var shown = chapters.filter(function (c) {
        if (!nf) return true;
        return normalizeText(c.chapter_title).indexOf(nf) !== -1 ||
               normalizeText(c.chapter).indexOf(nf) !== -1;
      });
      if (!shown.length) {
        list.appendChild(el("div", "empty-note",
          nf ? "فصلی با این عنوان پیدا نشد." : "برای این رفرنس فصلی ثبت نشده است."));
        return;
      }
      shown.forEach(function (c, i) {
        var item = el("div", "chapter-item");
        item.style.animationDelay = (Math.min(i, 12) * 25) + "ms";
        item.dataset.chapterKey = c.chapter_key;
        var reviewBit = c.review_count
          ? '<span class="review-mini"><i class="ti ti-flag"></i> ' + toFa(c.review_count) + ' بازبینی</span>'
          : '';
        item.innerHTML =
          '<div class="chapter-num">' + esc(c.chapter) + '</div>' +
          '<div class="chapter-main">' +
            '<div class="chapter-title-txt">' + esc(c.chapter_title) + '</div>' +
            '<div class="chapter-sub">' +
              '<span><i class="ti ti-clipboard-list"></i> ' + toFa(c.count) + ' سؤال</span>' +
              reviewBit +
            '</div>' +
          '</div>' +
          '<i class="ti ti-chevron-left"></i>';
        list.appendChild(item);
      });
    }

    function selectChapter(chapterKey) {
      state.currentChapterKey = chapterKey;
      state.chapterQuestions = (state.byBook[state.currentBook] || [])
        .filter(function (q) { return q.chapter_key === chapterKey; });
      // resume on first unanswered question
      var prog = chapterProgress(chapterKey);
      var resumeAt = 0;
      for (var k = 0; k < state.chapterQuestions.length; k++) {
        if (!prog.answers[state.chapterQuestions[k].question_id]) { resumeAt = k; break; }
        resumeAt = k;
      }
      state.index = resumeAt;
      showView("question");
      renderQuestion();
    }

    // ---------------------------------------------------------------------
    // Render question
    // ---------------------------------------------------------------------
    function renderQuestion() {
      var q = state.chapterQuestions[state.index];
      if (!q) return;
      renderQMeta(q);
      renderProgress();

      var prog = chapterProgress(state.currentChapterKey);
      var chosen = prog.answers[q.question_id] || null;

      var card = $("qCard");
      card.innerHTML = "";

      // top line: number + review badge
      var top = el("div", "q-topline");
      top.appendChild(el("span", "q-number-badge",
        "سؤال " + toFa(q.question_number) + " از " + toFa(state.chapterQuestions.length)));
      if (q.review_needed) {
        top.appendChild(el("span", "review-badge", '<i class="ti ti-flag"></i> نیازمند بازبینی علمی'));
      }
      card.appendChild(top);

      card.appendChild(el("div", "q-stem", esc(q.stem)));

      // options
      var optList = el("div", "opt-list");
      var hasAnyOption = OPTION_LABELS.some(function (l) { return (q.options[l] || "").trim(); });
      if (!hasAnyOption) {
        optList.appendChild(el("div", "opt empty-opt",
          '<span class="opt-text">گزینه‌ای برای این سؤال در دیتابیس ثبت نشده است.</span>'));
      } else {
        OPTION_LABELS.forEach(function (lab) {
          var text = (q.options[lab] || "").trim();
          var opt = el("button", "opt");
          opt.dataset.choice = lab;
          if (!text) { opt.classList.add("empty-opt", "locked"); }
          opt.innerHTML =
            '<span class="opt-key">' + lab + '</span>' +
            '<span class="opt-text">' + (text ? esc(text) : "—") + '</span>' +
            '<i class="ti opt-mark"></i>';
          optList.appendChild(opt);
        });
      }
      card.appendChild(optList);

      // answer panel placeholder
      card.appendChild(el("div", "answer-panel hidden", ""));

      // if already answered -> lock & reveal
      if (chosen) applyAnswerUI(q, chosen, false);

      // nav state
      $("prevBtn").disabled = state.index === 0;
      $("nextBtn").disabled = state.index === state.chapterQuestions.length - 1;
      $("jumpInput").value = "";
      $("jumpInput").max = state.chapterQuestions.length;
      $("jumpInput").placeholder = toFa(q.question_number);
      $("jumpError").textContent = "";
      $("counterLine").textContent =
        "سؤال " + toFa(q.question_number) + " از " + toFa(state.chapterQuestions.length) + " سؤال این فصل";
    }

    function renderQMeta(q) {
      var grid = $("qMetaGrid");
      var examDetail = (q.exam_region ? q.exam_region + " — " : "") + q.year;
      var rows = [
        { i: "ti-book", l: "نام کتاب", v: q.book_fa },
        { i: "ti-bookmark", l: "فصل", v: "فصل " + q.chapter + " — " + q.chapter_title },
        { i: "ti-school", l: "نوع آزمون", v: q.exam_type || "نامشخص" },
        { i: "ti-calendar", l: "جزئیات آزمون", v: examDetail }
      ];
      grid.innerHTML = "";
      rows.forEach(function (r) {
        grid.appendChild(el("div", "q-meta-item",
          '<div class="lbl"><i class="ti ' + r.i + '"></i> ' + esc(r.l) + '</div>' +
          '<div class="val">' + esc(r.v) + '</div>'));
      });
    }

    // ---------------------------------------------------------------------
    // Answer handling
    // ---------------------------------------------------------------------
    function handleAnswer(choice) {
      var q = state.chapterQuestions[state.index];
      var prog = chapterProgress(state.currentChapterKey);
      if (prog.answers[q.question_id]) return; // already answered, locked
      if (!(q.options[choice] || "").trim()) return; // can't pick empty option
      prog.answers[q.question_id] = choice;
      saveProgress();
      applyAnswerUI(q, choice, true);
      renderProgress();
    }

    function applyAnswerUI(q, choice, animate) {
      var card = $("qCard");
      var opts = card.querySelectorAll(".opt[data-choice]");
      var correct = q.answer; // may be ""
      opts.forEach(function (o) {
        o.classList.add("locked");
        var lab = o.dataset.choice;
        var mark = o.querySelector(".opt-mark");
        if (correct && lab === correct) {
          o.classList.add("correct");
          if (mark) mark.className = "ti opt-mark ti-circle-check";
        } else if (lab === choice && lab !== correct) {
          o.classList.add("wrong");
          if (mark) mark.className = "ti opt-mark ti-circle-x";
        } else {
          o.classList.add("disabled");
        }
        if (!animate) o.style.animation = "none";
      });

      var panel = card.querySelector(".answer-panel");
      panel.classList.remove("hidden");
      panel.innerHTML = buildAnswerPanel(q, choice);
    }

    function buildAnswerPanel(q, choice) {
      var html = "";
      var hasAnswer = !!q.answer;
      if (hasAnswer) {
        if (choice === q.answer) {
          html += '<div class="verdict good"><i class="ti ti-circle-check"></i> پاسخ شما صحیح است.</div>';
        } else {
          html += '<div class="verdict bad"><i class="ti ti-circle-x"></i> پاسخ شما نادرست بود.</div>';
        }
        html += '<div class="ans-block"><div class="ans-h"><i class="ti ti-check"></i> پاسخ صحیح</div>' +
                '<div class="ans-correct">گزینه ' + esc(q.answer) + '</div></div>';
      } else {
        html += '<div class="verdict neutral"><i class="ti ti-info-circle"></i> ' +
                'پاسخ صحیح در دیتابیس به‌صورت ساختاریافته مشخص نشده است.</div>';
      }

      html += '<div class="ans-block"><div class="ans-h"><i class="ti ti-notes"></i> پاسخنامه</div>' +
              '<div class="explain-text">' + esc(q.explanation) + '</div></div>';

      var ref = q.book_fa + " — فصل " + q.chapter + " — " + q.chapter_title;
      html += '<div class="ans-block"><div class="ans-h"><i class="ti ti-bookmark"></i> رفرنس</div>' +
              '<div class="citation-text">' + esc(ref);
      if (q.citation && normalizeText(q.citation) !== normalizeText(q.explanation)) {
        html += '<br><span style="color:var(--c-text-3)">' + esc(q.citation) + '</span>';
      }
      html += '</div></div>';
      return html;
    }

    // ---------------------------------------------------------------------
    // Progress display
    // ---------------------------------------------------------------------
    function renderProgress() {
      var total = state.chapterQuestions.length;
      var prog = chapterProgress(state.currentChapterKey);
      var done = 0, correct = 0, wrong = 0;
      state.chapterQuestions.forEach(function (q) {
        var a = prog.answers[q.question_id];
        if (!a) return;
        done++;
        if (q.answer) { if (a === q.answer) correct++; else wrong++; }
      });
      var pct = total ? Math.round(done / total * 100) : 0;
      $("progressStats").innerHTML =
        '<span class="pstat done"><i class="ti ti-checklist"></i> پاسخ‌داده: ' + toFa(done) + ' از ' + toFa(total) + '</span>' +
        '<span class="pstat correct"><i class="ti ti-circle-check"></i> درست: ' + toFa(correct) + '</span>' +
        '<span class="pstat wrong"><i class="ti ti-circle-x"></i> غلط: ' + toFa(wrong) + '</span>' +
        '<span class="pstat done"><i class="ti ti-percentage"></i> پیشرفت: ' + toFa(pct) + '٪</span>';
      $("progressBar").style.width = pct + "%";
    }

    function resetChapterProgress() {
      if (!state.currentChapterKey) return;
      if (!window.confirm("آیا از پاک کردن پیشرفت این فصل مطمئن هستید؟ این کار قابل بازگشت نیست.")) return;
      delete state.progress[state.currentChapterKey];
      saveProgress();
      state.index = 0;
      renderQuestion();
    }

    // ---------------------------------------------------------------------
    // Navigation
    // ---------------------------------------------------------------------
    function goPrev() { if (state.index > 0) { state.index--; renderQuestion(); } }
    function goNext() { if (state.index < state.chapterQuestions.length - 1) { state.index++; renderQuestion(); } }
    function jumpToQuestion() {
      var raw = $("jumpInput").value.trim();
      var err = $("jumpError");
      if (!raw) { err.textContent = "لطفاً شماره سؤال را وارد کنید."; return; }
      var n = parseInt(raw, 10);
      if (isNaN(n) || n < 1 || n > state.chapterQuestions.length) {
        err.textContent = "شماره سؤال باید بین ۱ تا " + toFa(state.chapterQuestions.length) + " باشد.";
        return;
      }
      state.index = n - 1;
      renderQuestion();
    }

    // ---------------------------------------------------------------------
    // Event delegation
    // ---------------------------------------------------------------------
    function bindEvents() {
      document.addEventListener("click", function (e) {
        var navEl = e.target.closest("[data-nav]");
        if (navEl) {
          var nav = navEl.dataset.nav;
          if (nav === "books") showView("books");
          else if (nav === "chapters") showView("chapters");
          return;
        }
        var book = e.target.closest("[data-book]");
        if (book) { selectBook(book.dataset.book); return; }

        var chap = e.target.closest("[data-chapterKey], [data-chapter-key]");
        if (chap) { selectChapter(chap.dataset.chapterKey); return; }

        var opt = e.target.closest(".opt[data-choice]");
        if (opt && !opt.classList.contains("locked")) { handleAnswer(opt.dataset.choice); return; }
      });

      $("prevBtn").addEventListener("click", goPrev);
      $("nextBtn").addEventListener("click", goNext);
      $("jumpBtn").addEventListener("click", jumpToQuestion);
      $("resetBtn").addEventListener("click", resetChapterProgress);
      $("retryBtn").addEventListener("click", loadData);
      $("jumpInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") jumpToQuestion();
      });
      $("chapterSearch").addEventListener("input", function (e) {
        renderChapterList(e.target.value);
      });

      document.addEventListener("keydown", function (e) {
        if ($("viewQuestion").classList.contains("hidden")) return;
        if (e.target.tagName === "INPUT") return;
        // RTL: راست = قبلی منطقی، چپ = بعدی
        if (e.key === "ArrowRight") goPrev();
        else if (e.key === "ArrowLeft") goNext();
      });
    }

    // ---------------------------------------------------------------------
    // Init
    // ---------------------------------------------------------------------
    bindEvents();
    loadData();
  })();
  </script>
</body>
</html>
