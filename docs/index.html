<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>بانک سؤالات بورد زنان و زایمان</title>
<meta name="description" content="مرور آزمونی سؤالات زنان و زایمان بر اساس رفرنس و فصل" />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" />
<style>
  :root {
    --bg: #eef2f7;
    --surface: #ffffff;
    --surface-2: #f8fafc;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #2563eb;
    --primary-dark: #1e3a8a;
    --primary-soft: #dbeafe;
    --correct: #15803d;
    --correct-soft: #dcfce7;
    --correct-border: #86efac;
    --wrong: #b91c1c;
    --wrong-soft: #fee2e2;
    --wrong-border: #fca5a5;
    --radius: 14px;
    --shadow: 0 1px 3px rgba(15, 23, 42, .07), 0 10px 30px rgba(15, 23, 42, .06);
    font-family: "Vazirmatn", system-ui, -apple-system, "Segoe UI", Tahoma, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    line-height: 1.85;
    font-size: 16px;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1200px; margin: 0 auto; padding: 14px clamp(10px, 3vw, 22px) 40px; }

  /* ---------- Header ---------- */
  header.app {
    background: linear-gradient(135deg, var(--primary-dark), var(--primary));
    color: #fff;
    border-radius: var(--radius);
    padding: 18px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }
  header.app h1 { margin: 0 0 4px; font-size: clamp(1.15rem, 3.4vw, 1.5rem); }
  header.app p { margin: 0; opacity: .92; font-size: clamp(.82rem, 2.4vw, .95rem); }

  /* ---------- Layout ---------- */
  .layout {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    gap: 16px;
    align-items: start;
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ---------- Filters ---------- */
  .filters {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    position: sticky;
    top: 12px;
  }
  @media (max-width: 880px) {
    .filters { position: static; }
  }
  .filters h2 {
    margin: 0 0 14px;
    font-size: 1rem;
    color: var(--primary-dark);
    display: flex; align-items: center; gap: 8px;
  }
  .field { margin-bottom: 13px; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: .82rem;
    color: var(--muted);
    margin-bottom: 5px;
    font-weight: 600;
  }
  select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: var(--surface-2) url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='14' height='14' viewBox='0 0 24 24' fill='none' stroke='%2364748b' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>") no-repeat left 12px center;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 12px;
    font-family: inherit;
    font-size: .92rem;
    color: var(--text);
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s;
  }
  select:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px var(--primary-soft);
  }
  select:disabled { opacity: .6; cursor: default; }
  .reset-btn {
    width: 100%;
    margin-top: 4px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    font-family: inherit;
    font-size: .88rem;
    color: var(--muted);
    cursor: pointer;
  }
  .reset-btn:hover { background: #eef2f7; color: var(--text); }

  /* ---------- Question card ---------- */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .card-meta {
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
    align-items: center;
  }
  .meta-pill {
    font-size: .76rem;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px 11px;
    color: var(--muted);
    white-space: nowrap;
  }
  .meta-pill b { color: var(--text); font-weight: 600; }
  .meta-pill.book { background: var(--primary-soft); border-color: #bfdbfe; color: var(--primary-dark); }
  .meta-pill.book b { color: var(--primary-dark); }
  .meta-pos { margin-inline-start: auto; font-size: .8rem; color: var(--muted); font-weight: 600; white-space: nowrap; }

  .card-body { padding: 16px clamp(14px, 2.5vw, 22px); }
  .q-number {
    display: inline-block;
    font-size: .78rem;
    font-weight: 700;
    color: var(--primary);
    background: var(--primary-soft);
    border-radius: 8px;
    padding: 2px 10px;
    margin-bottom: 10px;
  }
  .stem {
    font-size: clamp(1rem, 2.6vw, 1.1rem);
    font-weight: 600;
    margin: 0 0 16px;
    line-height: 2;
  }

  .options { display: flex; flex-direction: column; gap: 9px; }
  .opt {
    display: flex;
    align-items: flex-start;
    gap: 11px;
    width: 100%;
    text-align: start;
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    font-family: inherit;
    font-size: .96rem;
    color: var(--text);
    cursor: pointer;
    transition: border-color .12s, background .12s, box-shadow .12s;
  }
  .opt:hover:not(:disabled) { border-color: var(--primary); background: #fff; }
  .opt-key {
    flex: 0 0 auto;
    width: 26px; height: 26px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid var(--border);
    display: grid; place-items: center;
    font-size: .82rem; font-weight: 700; color: var(--muted);
  }
  .opt-text { flex: 1 1 auto; padding-top: 1px; }
  .opt.correct { border-color: var(--correct-border); background: var(--correct-soft); }
  .opt.correct .opt-key { background: var(--correct); border-color: var(--correct); color: #fff; }
  .opt.wrong { border-color: var(--wrong-border); background: var(--wrong-soft); }
  .opt.wrong .opt-key { background: var(--wrong); border-color: var(--wrong); color: #fff; }
  .opt:disabled { cursor: default; }

  /* ---------- Answer reveal ---------- */
  .reveal { margin-top: 16px; display: none; }
  .reveal.show { display: block; }
  .answer-line {
    display: flex; align-items: center; gap: 8px;
    background: var(--correct-soft);
    border: 1px solid var(--correct-border);
    color: var(--correct);
    border-radius: 10px;
    padding: 9px 14px;
    font-weight: 700;
    font-size: .95rem;
    margin-bottom: 12px;
  }
  .block-title {
    font-size: .8rem; font-weight: 700; color: var(--muted);
    margin: 0 0 6px; letter-spacing: .2px;
  }
  .explanation {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 13px 15px;
    font-size: .95rem;
    line-height: 2.05;
    white-space: pre-line;
    margin-bottom: 12px;
  }
  .reference {
    font-size: .86rem;
    color: var(--muted);
    background: #fff;
    border: 1px dashed var(--border);
    border-radius: 10px;
    padding: 10px 14px;
  }
  .reference b { color: var(--text); font-weight: 600; }

  /* ---------- Footer nav ---------- */
  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
    padding: 12px 16px;
    flex-wrap: wrap;
  }
  .nav button.nav-btn {
    flex: 0 0 auto;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-family: inherit;
    font-size: .92rem;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s;
  }
  .nav button.nav-btn:hover:not(:disabled) { background: var(--primary-dark); }
  .nav button.nav-btn:disabled { background: #cbd5e1; cursor: default; }
  .nav .nav-jump { flex: 1 1 auto; display: flex; align-items: center; gap: 8px; justify-content: center; min-width: 150px; }
  .nav .nav-jump label { font-size: .82rem; color: var(--muted); white-space: nowrap; }
  .nav .nav-jump select { width: auto; min-width: 88px; flex: 0 1 auto; }

  .empty, .loading {
    padding: 50px 20px;
    text-align: center;
    color: var(--muted);
  }
  .empty svg, .loading svg { opacity: .5; margin-bottom: 10px; }
  .error {
    margin: 0; padding: 16px;
    background: var(--wrong-soft);
    border: 1px solid var(--wrong-border);
    color: var(--wrong);
    border-radius: var(--radius);
  }

  @media (max-width: 560px) {
    .nav button.nav-btn { padding: 10px 14px; }
    .nav .nav-jump { order: 3; flex-basis: 100%; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>بانک سؤالات بورد زنان و زایمان</h1>
    <p>مرور آزمونی بر اساس رفرنس و فصل</p>
  </header>

  <div id="root">
    <div class="loading">
      <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      <div>در حال بارگذاری سؤال‌ها…</div>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var PROGRESS_KEY = "gynqb-progress-v1";
  var STATE_KEY = "gynqb-filters-v1";
  var OPTION_KEYS = ["الف", "ب", "ج", "د"];

  var QUESTIONS = [];
  var SUMMARY = null;
  var BOOKS = {};           // book_fa -> {chapters: [...]}
  var filtered = [];
  var current = 0;
  var progress = loadProgress();
  var ui = {};

  // ---- storage helpers ----
  function loadProgress() {
    try { return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveProgress() {
    try { localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); } catch (e) {}
  }
  function loadFilters() {
    try { return JSON.parse(localStorage.getItem(STATE_KEY)) || {}; }
    catch (e) { return {}; }
  }
  function saveFilters(f) {
    try { localStorage.setItem(STATE_KEY, JSON.stringify(f)); } catch (e) {}
  }

  // ---- data load ----
  Promise.all([
    fetch("questions.json", { cache: "no-cache" }).then(okJson),
    fetch("summary.json", { cache: "no-cache" }).then(okJson)
  ]).then(function (res) {
    QUESTIONS = res[0] || [];
    SUMMARY = res[1] || {};
    indexBooks();
    build();
  }).catch(function (err) {
    document.getElementById("root").innerHTML =
      '<p class="error">خطا در بارگذاری داده‌ها: ' + escapeHtml(String(err && err.message || err)) + '</p>';
  });

  function okJson(r) {
    if (!r.ok) throw new Error("HTTP " + r.status + " برای " + r.url.split("/").pop());
    return r.json();
  }

  function indexBooks() {
    var bookOrder = (SUMMARY && SUMMARY.book_order) || [];
    (SUMMARY.books || []).forEach(function (b) { BOOKS[b.book_fa] = b; });
    if (!bookOrder.length) bookOrder = Object.keys(BOOKS);
    SUMMARY._order = bookOrder;
  }

  // ---- build full UI skeleton ----
  function build() {
    var root = document.getElementById("root");
    root.innerHTML =
      '<div class="layout">' +
        '<aside class="filters">' +
          '<h2>' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>' +
            'فیلترها</h2>' +
          field("انتخاب رفرنس", "selBook") +
          field("انتخاب فصل / موضوع", "selChapter") +
          field("نمایش", "selAnswered") +
          field("انتخاب شماره سؤال", "selNumber") +
          '<button class="reset-btn" id="btnReset">حذف فیلترها</button>' +
        '</aside>' +
        '<main id="cardHost"></main>' +
      '</div>';

    ui.selBook = document.getElementById("selBook");
    ui.selChapter = document.getElementById("selChapter");
    ui.selAnswered = document.getElementById("selAnswered");
    ui.selNumber = document.getElementById("selNumber");
    ui.cardHost = document.getElementById("cardHost");

    // reference dropdown
    var optsBook = '<option value="">همه رفرنس‌ها</option>';
    SUMMARY._order.forEach(function (bf) {
      if (!BOOKS[bf]) return;
      optsBook += '<option value="' + escapeAttr(bf) + '">' + escapeHtml(bf) + '</option>';
    });
    ui.selBook.innerHTML = optsBook;

    ui.selAnswered.innerHTML =
      '<option value="all">همه سؤال‌ها</option>' +
      '<option value="unseen">فقط پاسخ‌داده‌نشده‌ها</option>';

    // restore saved filters
    var saved = loadFilters();
    if (saved.book && BOOKS[saved.book]) ui.selBook.value = saved.book;
    populateChapters(saved.chapter || "");
    if (saved.answered) ui.selAnswered.value = saved.answered;

    ui.selBook.addEventListener("change", function () { populateChapters(""); applyFilters(true); });
    ui.selChapter.addEventListener("change", function () { applyFilters(true); });
    ui.selAnswered.addEventListener("change", function () { applyFilters(true); });
    ui.selNumber.addEventListener("change", function () {
      var i = parseInt(ui.selNumber.value, 10);
      if (!isNaN(i)) { current = i; renderCard(); }
    });
    document.getElementById("btnReset").addEventListener("click", function () {
      ui.selBook.value = ""; populateChapters(""); ui.selAnswered.value = "all";
      applyFilters(true);
    });

    applyFilters(false);
  }

  function field(label, id) {
    return '<div class="field"><label for="' + id + '">' + escapeHtml(label) +
           '</label><select id="' + id + '"></select></div>';
  }

  function populateChapters(selectedKey) {
    var bf = ui.selBook.value;
    var html = '<option value="">همه فصل‌ها / موضوعات</option>';
    if (bf && BOOKS[bf]) {
      BOOKS[bf].chapters.forEach(function (c) {
        html += '<option value="' + escapeAttr(c.chapter_key) + '">' +
                escapeHtml(c.chapter_label) + '</option>';
      });
    }
    ui.selChapter.innerHTML = html;
    ui.selChapter.disabled = !bf;
    if (selectedKey) ui.selChapter.value = selectedKey;
  }

  // ---- filtering ----
  function applyFilters(resetIndex) {
    var bf = ui.selBook.value;
    var ck = ui.selChapter.value;
    var ans = ui.selAnswered.value;

    filtered = QUESTIONS.filter(function (q) {
      if (bf && q.book_fa !== bf) return false;
      if (ck && q.chapter_key !== ck) return false;
      if (ans === "unseen" && progress[q.question_id]) return false;
      return true;
    });

    saveFilters({ book: bf, chapter: ck, answered: ans });

    var numHtml = "";
    filtered.forEach(function (q, i) {
      numHtml += '<option value="' + i + '">سؤال ' + toFa(q.question_number) + '</option>';
    });
    ui.selNumber.innerHTML = numHtml || '<option value="">—</option>';
    ui.selNumber.disabled = !filtered.length;

    if (resetIndex || current >= filtered.length) current = 0;
    renderCard();
  }

  // ---- render question card ----
  function renderCard() {
    if (!filtered.length) {
      ui.cardHost.innerHTML =
        '<div class="card"><div class="empty">' +
        '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<div>سؤالی با این فیلترها یافت نشد.</div></div></div>';
      return;
    }
    if (current < 0) current = 0;
    if (current >= filtered.length) current = filtered.length - 1;

    ui.selNumber.value = String(current);

    var q = filtered[current];
    var saved = progress[q.question_id];
    var answered = !!saved;

    var meta =
      '<div class="card-meta">' +
        '<span class="meta-pill book"><b>' + escapeHtml(q.book_fa) + '</b></span>' +
        '<span class="meta-pill">' + escapeHtml(q.chapter_label) + '</span>' +
        (q.exam_type ? '<span class="meta-pill">نوع آزمون: <b>' + escapeHtml(q.exam_type) + '</b></span>' : '') +
        (q.exam_region ? '<span class="meta-pill">' + escapeHtml(q.exam_region) + '</span>' : '') +
        '<span class="meta-pill">سال: <b>' + escapeHtml(q.year || "۱۴۰۳") + '</b></span>' +
        '<span class="meta-pos">سؤال ' + toFa(current + 1) + ' از ' + toFa(filtered.length) + '</span>' +
      '</div>';

    var optsHtml = "";
    OPTION_KEYS.forEach(function (k) {
      var txt = (q.options && q.options[k]) || "";
      if (!txt) return;
      var cls = "opt";
      if (answered) {
        if (q.answer && k === q.answer) cls += " correct";
        else if (saved.selected === k) cls += " wrong";
      }
      optsHtml +=
        '<button class="' + cls + '" data-key="' + escapeAttr(k) + '"' + (answered ? ' disabled' : '') + '>' +
          '<span class="opt-key">' + escapeHtml(k) + '</span>' +
          '<span class="opt-text">' + escapeHtml(txt) + '</span>' +
        '</button>';
    });

    var reveal = "";
    if (answered) {
      var ansLine = q.answer
        ? '<div class="answer-line">' +
            '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' +
            'پاسخ صحیح: گزینه ' + escapeHtml(q.answer) + '</div>'
        : '';
      var expl = q.explanation
        ? '<p class="block-title">توضیح</p><div class="explanation">' + escapeHtml(q.explanation) + '</div>'
        : '';
      var ref = q.reference_text
        ? '<p class="block-title">رفرنس</p><div class="reference"><b>' + escapeHtml(q.reference_text) + '</b></div>'
        : '';
      reveal = '<div class="reveal show">' + ansLine + expl + ref + '</div>';
    }

    ui.cardHost.innerHTML =
      '<div class="card">' +
        meta +
        '<div class="card-body">' +
          '<span class="q-number">سؤال شماره ' + toFa(q.question_number) + '</span>' +
          '<p class="stem">' + escapeHtml(q.stem) + '</p>' +
          '<div class="options">' + optsHtml + '</div>' +
          reveal +
        '</div>' +
        navHtml() +
      '</div>';

    Array.prototype.forEach.call(ui.cardHost.querySelectorAll(".opt"), function (btn) {
      btn.addEventListener("click", function () {
        if (progress[q.question_id]) return;
        var k = btn.getAttribute("data-key");
        progress[q.question_id] = { selected: k, correct: q.answer ? (k === q.answer) : null };
        saveProgress();
        renderCard();
      });
    });
    wireNav();
  }

  function navHtml() {
    var atStart = current <= 0;
    var atEnd = current >= filtered.length - 1;
    return '<div class="nav">' +
      '<button class="nav-btn" id="btnPrev"' + (atStart ? ' disabled' : '') + '>قبلی</button>' +
      '<div class="nav-jump"><label for="navNum">برو به سؤال:</label><select id="navNum"></select></div>' +
      '<button class="nav-btn" id="btnNext"' + (atEnd ? ' disabled' : '') + '>بعدی</button>' +
      '</div>';
  }

  function wireNav() {
    var prev = document.getElementById("btnPrev");
    var next = document.getElementById("btnNext");
    var navNum = document.getElementById("navNum");
    if (prev) prev.addEventListener("click", function () { if (current > 0) { current--; renderCard(); } });
    if (next) next.addEventListener("click", function () { if (current < filtered.length - 1) { current++; renderCard(); } });
    if (navNum) {
      var html = "";
      filtered.forEach(function (q, i) {
        html += '<option value="' + i + '"' + (i === current ? ' selected' : '') + '>' +
                toFa(q.question_number) + '</option>';
      });
      navNum.innerHTML = html;
      navNum.addEventListener("change", function () {
        var i = parseInt(navNum.value, 10);
        if (!isNaN(i)) { current = i; renderCard(); }
      });
    }
  }

  // ---- utils ----
  function escapeHtml(str) {
    return String(str == null ? "" : str)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  function escapeAttr(str) { return escapeHtml(str); }
  function toFa(n) {
    return String(n).replace(/[0-9]/g, function (d) { return "۰۱۲۳۴۵۶۷۸۹"[d]; });
  }
})();
</script>
</body>
</html>
